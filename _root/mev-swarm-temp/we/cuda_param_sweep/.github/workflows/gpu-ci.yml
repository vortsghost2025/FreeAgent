name: GPU CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cuda-benchmark:
    runs-on: ubuntu-latest

    container:
      image: nvidia/cuda:12.4.0-devel-ubuntu22.04
      options: --gpus all

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y cmake python3-pip ccache
          python3 -m pip install --user pandas matplotlib seaborn

      - name: Enable ccache for nvcc
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CMAKE_CUDA_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Validate environment
        run: ./validate_environment.sh

      - name: Build & run benchmark (parallel if multi-GPU)
        run: |
          chmod +x *.sh
          # Count GPUs (nvidia-smi should be available in the CUDA image)
          GPU_COUNT=$(nvidia-smi -L 2>/dev/null | wc -l || echo 0)
          echo "Found GPUs: $GPU_COUNT"
          if [ "$GPU_COUNT" -ge 2 ]; then
            echo "Running low-range and high-range sweeps in parallel"
            ./run_sweep_part1.sh & ./run_sweep_part2.sh & wait
          else
            echo "Single (or no) GPU detected; running full suite"
            chmod +x ./run_all_with_advice.sh || true
            ./run_all_with_advice.sh
          fi

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: |
            sweep_results.csv
            sweep_results.png
