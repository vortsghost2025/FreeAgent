# Federation Game - Nginx Configuration
# Routes game.deliberateensemble.works to the FastAPI backend

upstream game_backend {
    server game:8000;
    keepalive 32;
}

# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name game.deliberateensemble.works deliberateensemble.works;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - serve the game
server {
    listen 443 ssl http2;
    server_name game.deliberateensemble.works;

    ssl_certificate /etc/letsencrypt/live/game.deliberateensemble.works/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.deliberateensemble.works/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Game API
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://game_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Frontend static files
    location / {
        proxy_pass http://game_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
