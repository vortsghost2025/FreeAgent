# Deliberate Ensemble - Nginx Configuration
# game.deliberateensemble.works  → FastAPI game (port 8000)
# weather.deliberateensemble.works → Weather server (port 3000)
# deliberateensemble.works        → Mission control (served by game container)

# Docker's internal DNS resolver (required for dynamic hostname resolution)
resolver 127.0.0.11 valid=30s ipv6=off;

upstream game_backend {
    server game:8000;
    keepalive 32;
}

# ─── HTTP: game + mission control ────────────────────────────────────────────
server {
    listen 80;
    server_name game.deliberateensemble.works;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: game.deliberateensemble.works ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name game.deliberateensemble.works;

    ssl_certificate /etc/letsencrypt/live/game.deliberateensemble.works/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.deliberateensemble.works/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://game_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://game_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── HTTP: weather.deliberateensemble.works → redirect to HTTPS ──────────────
server {
    listen 80;
    server_name weather.deliberateensemble.works;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: weather.deliberateensemble.works ──────────────────────────────────
server {
    listen 443 ssl http2;
    server_name weather.deliberateensemble.works;

    ssl_certificate /etc/letsencrypt/live/swarm.deliberateensemble.works/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swarm.deliberateensemble.works/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        set $weather_upstream http://weather:3000;
        proxy_pass $weather_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    }
}

# ─── HTTP: deliberateensemble.works → Mission Control ────────────────────────
server {
    listen 80;
    server_name deliberateensemble.works www.deliberateensemble.works;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://game_backend/mission-control/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─── HTTP: swarm.deliberateensemble.works → redirect to HTTPS ────────────────
server {
    listen 80;
    server_name swarm.deliberateensemble.works;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: swarm.deliberateensemble.works → static swarm files ──────────────
server {
    listen 443 ssl http2;
    server_name swarm.deliberateensemble.works;

    ssl_certificate /etc/letsencrypt/live/swarm.deliberateensemble.works/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swarm.deliberateensemble.works/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /app/swarm;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # WHO GHO API proxy — avoids browser CORS block
    location /proxy/who/ {
        proxy_pass https://ghoapi.azureedge.net/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host ghoapi.azureedge.net;
        proxy_set_header Accept "application/json";
        add_header Access-Control-Allow-Origin * always;
        proxy_cache_valid 200 60m;
    }

    # CDC Open Data proxy — avoids browser CORS block
    location /proxy/cdc/ {
        proxy_pass https://data.cdc.gov/resource/;
        proxy_ssl_server_name on;
        proxy_set_header Host data.cdc.gov;
        proxy_set_header Accept "application/json";
        proxy_set_header User-Agent "Mozilla/5.0 (compatible; WE4FREE/1.0)";
        proxy_set_header X-App-Token "";
        proxy_hide_header X-Frame-Options;
        add_header Access-Control-Allow-Origin * always;
        proxy_cache_valid 200 60m;
    }

    gzip on;
    gzip_types text/javascript application/javascript application/json text/html;
}

# ─── Default: catch all other requests ───────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
