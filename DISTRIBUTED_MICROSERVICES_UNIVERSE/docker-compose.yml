version: '3.8'

services:
  game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: federation-game
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - game_saves:/tmp/federation_saves
      - ./frontend:/app/frontend:ro
    networks:
      - game_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  weather:
    build:
      context: ./weather-server
      dockerfile: Dockerfile
    container_name: weather-server
    restart: unless-stopped
    # No host port binding needed — nginx accesses weather via docker network only
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NOAA_API_KEY=${NOAA_API_KEY:-DEMO_KEY}
      - NASA_EARTHDATA_API_KEY=${NASA_EARTHDATA_API_KEY:-DEMO_KEY}
    networks:
      - game_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: federation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
      - certbot_www:/var/www/certbot:ro
      - /app/swarm:/app/swarm:ro
    depends_on:
      - game
      - weather
    networks:
      - game_net

volumes:
  game_saves:
  nginx_logs:
  certbot_www:

networks:
  game_net:
    driver: bridge
