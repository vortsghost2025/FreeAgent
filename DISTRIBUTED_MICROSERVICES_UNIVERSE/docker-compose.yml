version: '3.8'

services:
  game:
    build:
      context: /app/federation-game
      dockerfile: Dockerfile
    container_name: federation-game
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - game_saves:/tmp/federation_saves
    networks:
      - game_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: federation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - game
    networks:
      - game_net

volumes:
  game_saves:
  nginx_logs:

networks:
  game_net:
    driver: bridge
