<!DOCTYPE html>
<html>
<head>
    <title>WE4Free Remote Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #00ff00; }
        .container { max-width: 600px; margin: 0 auto; }
        .stats { background: #2a2a2a; padding: 20px; border-radius: 10px; margin: 10px 0; }
        .stat-item { margin: 10px 0; }
        .refresh-btn { background: #00ff00; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .status { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 WE4Free YOLO Monitor</h1>
        
        <div class="stats">
            <div class="stat-item"><span class="status" id="status">📡 Connecting...</span></div>
            <div class="stat-item">⏱️ Uptime: <span id="uptime">--</span></div>
            <div class="stat-item">🎯 Pipelines: <span id="pipelines">--</span></div>
            <div class="stat-item">⚡ Rate: <span id="rate">--</span> pipelines/sec</div>
            <div class="stat-item">✅ Success: <span id="success">--</span>%</div>
        </div>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>
        
        <div style="margin-top: 20px;">
            <h3>📞 Emergency Commands:</h3>
            <button class="refresh-btn" onclick="sendCommand('stop')" style="background: #ff4444;">⏹️ STOP TEST</button>
            <button class="refresh-btn" onclick="sendCommand('pause')" style="background: #ffaa00;">⏸️ PAUSE</button>
            <button class="refresh-btn" onclick="sendCommand('resume')" style="background: #44ff44;">▶️ RESUME</button>
        </div>
    </div>

    <script>
        // Update with your PC's IP address
        const PC_IP = 'localhost:8889';
        
        async function refreshData() {
            try {
                const response = await fetch(`http://${PC_IP}/api/system/status`);
                const data = await response.json();
                
                document.getElementById('status').textContent = '✅ CONNECTED';
                document.getElementById('status').style.color = '#00ff00';
                
                // Update stats (adjust based on actual API response)
                document.getElementById('uptime').textContent = data.uptime || '--';
                document.getElementById('pipelines').textContent = data.pipelinesProcessed || '--';
                document.getElementById('rate').textContent = data.currentRate || '--';
                document.getElementById('success').textContent = data.successRate || '--';
                
            } catch (error) {
                document.getElementById('status').textContent = '❌ DISCONNECTED';
                document.getElementById('status').style.color = '#ff4444';
                console.error('Connection failed:', error);
            }
        }
        
        async function sendCommand(command) {
            try {
                const response = await fetch(`http://${PC_IP}/api/control/${command}`, {
                    method: 'POST'
                });
                alert(`Command sent: ${command.toUpperCase()}`);
            } catch (error) {
                alert(`Failed to send command: ${error.message}`);
            }
        }
        
        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
        
        // Initial load
        refreshData();
    </script>
</body>
</html>
